name: Android CI Build

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses and install Android packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Prepare signing config
        id: signing
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' && secrets.RELEASE_STORE_PASSWORD != '' && secrets.RELEASE_KEY_ALIAS != '' && secrets.RELEASE_KEY_PASSWORD != '' }}
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "store_file=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        env:
          ORG_GRADLE_PROJECT_MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          ORG_GRADLE_PROJECT_RELEASE_STORE_FILE: ${{ steps.signing.outputs.store_file }}
          ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Read app version
        id: app_version
        run: |
          VERSION_CODE=$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path('app/build.gradle').read_text()
          print(re.search(r'versionCode\s*=\s*(\d+)', text).group(1))
          PY
          )
          VERSION_NAME=$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path('app/build.gradle').read_text()
          print(re.search(r'versionName\s*=\s*"([^"]+)"', text).group(1))
          PY
          )
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Rename debug APK
        run: cp app/build/outputs/apk/debug/app-debug.apk ./app-debug.apk

      - name: Write update metadata
        run: |
          cat > update.json <<EOF
          {
            "versionCode": ${{ steps.app_version.outputs.version_code }},
            "versionName": "${{ steps.app_version.outputs.version_name }}",
            "apkName": "app-debug.apk"
          }
          EOF

      - name: Publish debug release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: Debug Latest
          prerelease: true
          make_latest: false
          files: |
            app-debug.apk
            update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
